services:
  - type: web
    name: sciforge
    runtime: node
    plan: free
    buildCommand: npm install && npx vite build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
